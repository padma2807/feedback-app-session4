<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Masai Live</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <h1>Masai Live</h1>
            <p>Your feedback helps us grow and improve.</p>
        </header>

        <form id="feedbackForm">
            <div class="input-group">
                <label for="name">Student Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label for="rating">Overall Rating</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" /><label for="star5" title="Amazing">★</label>
                    <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="Good">★</label>
                    <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="Average">★</label>
                    <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="Bad">★</label>
                    <input type="radio" id="star1" name="rating" value="1" required /><label for="star1" title="Very Bad">★</label>
                </div>
            </div>

            <div class="input-group">
                <label for="experience">Overall Experience</label>
                <textarea id="experience" name="experience" rows="4" placeholder="Tell us about your journey..." required></textarea>
            </div>

            <button type="submit" id="submitBtn">
                <span class="btn-text">Submit Feedback</span>
                <span class="loader"></span>
            </button>
        </form>

        <div id="toast" class="toast"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
